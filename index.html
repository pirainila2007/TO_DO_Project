<!DOCTYPE html>
<html lang="en">
<head>
    <title>To_Do_Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class =" container"> 
        <h1>To do List </h1>
        <div class="input"> 
            <input type="text" id="task" placeholder="Enter Your Task Here">
            <button onclick="addTask()"> ADD </button>
        </div>
        <div class="filter-section">
            <button onclick="filterTask('All')">All</button>
            <button onclick="filterTask('pending')">Pending</button>
            <button onclick="filterTask('complete')">Complete</button>
        </div>
        <div class="tasks-container">
            <div class="tasks-header">
                <span>Your Tasks</span>
                <span id="taskCount">0 Tasks</span>
            </div>
            <ul id="taskList" class="task-list">
                <li class="empty-state">No tasks yet </li>
            </ul>
        </div>
    </div> 
    <script src ="script.js"></script>

</body>
</html>
