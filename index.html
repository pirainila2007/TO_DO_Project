<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To_Do_Project</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper"> 
    <h1>TO DO LIST</h1>

    <input type="text" id="taskInput" placeholder="Enter Your Task Here">
    <button id="addBtn">ADD</button>
  </div>

  <div class="filter-section">
    <button onclick="filterTask('All')">All</button>
    <button onclick="filterTask('Pending')">Pending</button>
    <button onclick="filterTask('Complete')">Complete</button>
  </div>
    
  <div class="container">
    <div class="header">
      <span>Your Tasks</span>
      <span id="taskCount">0 Tasks</span>
    </div>
    <ul id="taskList" class="list">
      <li class="empty">No tasks yet</li>
    </ul>
  </div> 

  <script src="script.js"></script>
</body>
</html>
